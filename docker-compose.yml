version: '3.4'
services:
  redis:
    image: redis:3.2.7
    volumes:
        - ./.docker/docker-requirements.txt:/requirements.txt

  postgres:
    image: postgres:11
    environment:
        - POSTGRES_USER=airflow
        - POSTGRES_PASSWORD=airflow
        - POSTGRES_DB=airflow

  webserver:
    image: puckel/docker-airflow:1.10.3
    restart: always
    depends_on:
        - postgres
        - redis
    environment:
        - LOAD_EX=n
        - FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
        - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
        - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    volumes:
        - ./:/usr/local/airflow/dags/cob_datapipeline
        - ./data:/usr/local/airflow/data
        - ./.docker/docker-requirements.txt:/requirements.txt
    ports:
        - "8010:8080"
    command: webserver
    healthcheck:
        test: ["CMD-SHELL", "[ -f /usr/local/airflow/airflow-webserver.pid ]"]
        interval: 30s
        timeout: 30s
        retries: 3

  flower:
    image: puckel/docker-airflow:1.10.3
    restart: always
    depends_on:
        - redis
    environment:
        - LOAD_EX=n
        - FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
        - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
        - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    ports:
        - "5555:5555"
    command: flower
    volumes:
        - ./.docker/docker-requirements.txt:/requirements.txt

  scheduler:
    image: puckel/docker-airflow:1.10.3
    restart: always
    depends_on:
        - webserver
    volumes:
        - ./:/usr/local/airflow/dags/cob_datapipeline
        - ./data:/usr/local/airflow/data
        - ./.docker/docker-requirements.txt:/requirements.txt
    environment:
        - LOAD_EX=n
        - FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
        - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
        - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    command: scheduler

  worker:
    build:
      context: .
      dockerfile: .docker/worker/Dockerfile
      args:
        AIRFLOW_DEPS: ${AIRFLOW_DEPS}
        PYTHON_DEPS: ${PYTHON_DEPS}
    restart: always
    depends_on:
        - scheduler
    volumes:
        - ./:/usr/local/airflow/dags/cob_datapipeline
        - ./data:/usr/local/airflow/data
        - ./.docker/docker-requirements.txt:/requirements.txt
        - ./ssh:/ssh
    environment:
        - FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
        - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
        - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
        - GITHUB_TOKEN=${GITHUB_TOKEN}
    command: worker
